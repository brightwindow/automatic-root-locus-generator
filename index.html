<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<title>Root Locus Plotter</title>
<meta name="description" content="Interactive root locus plotter — visualize closed-loop pole trajectories in real time as you sweep the gain K.">
<meta property="og:title" content="Root Locus Plotter">
<meta property="og:description" content="Interactive root locus plotter — visualize closed-loop pole trajectories in real time.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0e1a'/%3E%3Cpath d='M4 16 Q12 4 16 16 T28 16' stroke='%23fbbf24' stroke-width='2' fill='none'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23ef4444'/%3E%3C/svg%3E">
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #131829;
    --panel-2: #1a2138;
    --line: #2a3454;
    --text: #e6ebf5;
    --muted: #7d89a8;
    --accent: #4ade80;
    --accent-2: #22d3ee;
    --pole: #f87171;
    --zero: #60a5fa;
    --locus: #fbbf24;
    --current: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    font-family: 'Inter', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: 'cv11', 'ss01', 'ss03';
    letter-spacing: -0.01em;
  }
  code, .mono, input[type="text"], input[type="number"] {
    font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
    font-feature-settings: 'calt', 'ss01';
  }
  body {
    background:
      radial-gradient(ellipse at top, rgba(74, 222, 128, 0.06), transparent 60%),
      var(--bg);
    padding: 12px;
    min-height: 100vh;
  }
  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  h1 .accent {
    color: var(--accent);
    font-weight: 800;
    letter-spacing: 0.02em;
  }
  .subtitle {
    color: var(--muted);
    font-size: 12px;
    margin-top: 4px;
    font-weight: 400;
    letter-spacing: 0;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .panel h2 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel h2::before {
    content: '';
    width: 3px;
    height: 12px;
    background: var(--accent);
    border-radius: 2px;
  }
  .field { margin-bottom: 10px; }
  label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    -webkit-appearance: none;
  }
  input:focus { outline: none; border-color: var(--accent); }

  .formula {
    background: var(--panel-2);
    border-left: 3px solid var(--accent-2);
    padding: 8px 10px;
    border-radius: 4px;
    font-size: 11px;
    margin-bottom: 10px;
    color: var(--muted);
    line-height: 1.6;
  }
  .formula code { color: var(--text); }

  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  button {
    background: var(--accent);
    color: #0a0e1a;
    border: none;
    padding: 11px 14px;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.02em;
    touch-action: manipulation;
  }
  button:active { transform: scale(0.97); }
  button.secondary {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--line);
  }

  .preset-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin: 0 -2px;
    -webkit-overflow-scrolling: touch;
  }
  .preset-row button {
    flex: 0 0 auto;
    font-size: 10px;
    padding: 7px 10px;
    background: var(--panel-2);
    color: var(--muted);
    border: 1px solid var(--line);
    white-space: nowrap;
  }

  /* === 캔버스 === */
  .plot-wrap {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px;
    position: relative;
    margin-bottom: 12px;
  }
  canvas {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 6px;
    background: #060912;
    touch-action: none;
  }
  .legend {
    display: flex;
    gap: 12px;
    margin-top: 10px;
    flex-wrap: wrap;
    font-size: 10px;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .swatch { width: 12px; height: 12px; border-radius: 2px; }
  .swatch.pole {
    background: transparent;
    border: 2px solid var(--pole);
    position: relative;
  }
  .swatch.zero {
    background: transparent;
    border: 2px solid var(--zero);
    border-radius: 50%;
  }
  .swatch.locus { background: var(--locus); border-radius: 50%; }
  .swatch.current { background: var(--current); border-radius: 50%; box-shadow: 0 0 6px var(--current); }

  /* === K 슬라이더 (큰 영역) === */
  .k-control {
    background: linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 14px 16px;
    margin-bottom: 12px;
    position: sticky;
    bottom: 12px;
    z-index: 10;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
  .k-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .k-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-weight: 600;
  }
  .k-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: var(--current);
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 12px rgba(239, 68, 68, 0.5);
    letter-spacing: -0.02em;
  }
  /* K 직접 입력 input — 표시 div와 똑같이 보이지만 편집 가능 */
  .k-value-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: var(--current);
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 12px rgba(239, 68, 68, 0.5);
    letter-spacing: -0.02em;
    background: transparent;
    border: none;
    border-bottom: 1.5px dashed rgba(239, 68, 68, 0.3);
    padding: 0 2px 2px;
    text-align: right;
    width: 140px;
    -webkit-appearance: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .k-value-input:hover {
    border-bottom-color: rgba(239, 68, 68, 0.6);
  }
  .k-value-input:focus {
    outline: none;
    border-bottom-color: var(--current);
    background: rgba(239, 68, 68, 0.08);
    border-radius: 4px 4px 0 0;
  }

  /* 모바일 친화적 슬라이더 */
  .slider-track {
    position: relative;
    height: 40px;
    background: var(--panel-2);
    border-radius: 20px;
    border: 1px solid var(--line);
    cursor: pointer;
    touch-action: none;
    overflow: hidden;
  }
  .slider-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    background: linear-gradient(90deg, rgba(251, 191, 36, 0.15), rgba(239, 68, 68, 0.35));
    border-radius: 20px;
    transition: width 0.05s linear;
  }
  .slider-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 32px;
    height: 32px;
    background: var(--current);
    border: 3px solid #fff;
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(239, 68, 68, 0.6);
    transition: transform 0.05s;
    pointer-events: none;
  }
  .slider-track:active .slider-thumb { transform: translate(-50%, -50%) scale(1.15); }

  .k-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 10px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .k-step-row {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .k-step-row button {
    flex: 1;
    padding: 8px 4px;
    font-size: 11px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--line);
    font-weight: 500;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 6px;
  }
  .info-card {
    background: var(--panel-2);
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--line);
  }
  .info-card .lbl {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
  }
  .info-card .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    margin-top: 4px;
    word-break: break-all;
    line-height: 1.5;
    font-weight: 500;
  }
  .error {
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.3);
    color: #fca5a5;
    padding: 9px 11px;
    border-radius: 6px;
    font-size: 11px;
    margin-top: 8px;
    display: none;
  }
  .error.show { display: block; }

  /* 데스크탑에서는 2열 레이아웃 */
  @media (min-width: 900px) {
    body { padding: 24px; }
    .container { max-width: 1300px; margin: 0 auto; }
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
    }
    h1 { font-size: 28px; }
    .subtitle { font-size: 14px; }
    .k-control { position: relative; bottom: auto; }
  }
</style>

<body>
<div class="container">
  <header>
    <h1>Root <span class="accent">Locus</span> Plotter</h1>
    <div class="subtitle">Interactive closed-loop pole visualization · drag K to explore</div>
  </header>

  <div class="layout">
    <div>
      <!-- 입력 -->
      <div class="panel">
        <h2>전달함수 G(s) = K · N(s) / D(s)</h2>
        <div class="formula">
          높은 차수부터 공백/쉼표로 구분<br>
          예) <code>1 3 2 0</code> = s³+3s²+2s
        </div>
        <div class="field">
          <label>분자 N(s)</label>
          <input type="text" id="num" value="1" inputmode="decimal">
        </div>
        <div class="field">
          <label>분모 D(s)</label>
          <input type="text" id="den" value="1 3 2 0" inputmode="decimal">
        </div>
        <div class="field">
          <label>K 최대값</label>
          <input type="text" id="kmax" value="50" inputmode="decimal">
        </div>
        <div class="row">
          <button onclick="plot()">▶ 그리기</button>
          <button class="secondary" onclick="resetView()">화면 리셋</button>
        </div>
        <div class="error" id="error"></div>
      </div>

      <!-- 프리셋 -->
      <div class="panel">
        <h2>프리셋</h2>
        <div class="preset-row">
          <button onclick="setPreset('1','1 3 2 0',50)">1/[s(s+1)(s+2)]</button>
          <button onclick="setPreset('1 1','1 0 0',20)">(s+1)/s²</button>
          <button onclick="setPreset('1 4','1 2 5 0',30)">(s+4)/[s(s²+2s+5)]</button>
          <button onclick="setPreset('1','1 6 11 6',100)">1/[(s+1)(s+2)(s+3)]</button>
          <button onclick="setPreset('1 2','1 0 0 0',15)">(s+2)/s³</button>
        </div>
      </div>

      <!-- 분석정보 -->
      <div class="panel">
        <h2>분석</h2>
        <div class="info-grid">
          <div class="info-card">
            <div class="lbl">Poles (n)</div>
            <div class="val" id="info-poles">—</div>
          </div>
          <div class="info-card">
            <div class="lbl">Zeros (m)</div>
            <div class="val" id="info-zeros">—</div>
          </div>
          <div class="info-card">
            <div class="lbl">점근선 개수</div>
            <div class="val" id="info-asym">—</div>
          </div>
          <div class="info-card">
            <div class="lbl">점근선 중심</div>
            <div class="val" id="info-center">—</div>
          </div>
          <div class="info-card" style="grid-column: 1/-1;">
            <div class="lbl">현재 K의 폐루프 극점</div>
            <div class="val" id="info-current">—</div>
          </div>
        </div>
      </div>
    </div>

    <div>
      <!-- 플롯 -->
      <div class="plot-wrap">
        <canvas id="canvas"></canvas>
        <div class="legend">
          <div class="legend-item"><div class="swatch pole"></div>개루프극점</div>
          <div class="legend-item"><div class="swatch zero"></div>개루프영점</div>
          <div class="legend-item"><div class="swatch locus"></div>궤적</div>
          <div class="legend-item"><div class="swatch current"></div>현재 K 위치</div>
        </div>
      </div>

      <!-- K 슬라이더 (핵심 컨트롤) -->
      <div class="k-control">
        <div class="k-header">
          <div class="k-label">K =</div>
          <input type="text" class="k-value-input" id="kdisplay" value="0.00" inputmode="decimal" autocomplete="off">
        </div>
        <div class="slider-track" id="slider">
          <div class="slider-fill" id="sliderFill"></div>
          <div class="slider-thumb" id="sliderThumb"></div>
        </div>
        <div class="k-meta">
          <span>0</span>
          <span id="kmaxLabel">50</span>
        </div>
        <div class="k-step-row">
          <button onclick="stepK(-1)">−1</button>
          <button onclick="stepK(-0.1)">−0.1</button>
          <button onclick="stepK(0.1)">+0.1</button>
          <button onclick="stepK(1)">+1</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// Complex utilities
// ============================================================
const C = {
  add: (a, b) => [a[0]+b[0], a[1]+b[1]],
  sub: (a, b) => [a[0]-b[0], a[1]-b[1]],
  mul: (a, b) => [a[0]*b[0]-a[1]*b[1], a[0]*b[1]+a[1]*b[0]],
  div: (a, b) => {
    const d = b[0]*b[0]+b[1]*b[1];
    return [(a[0]*b[0]+a[1]*b[1])/d, (a[1]*b[0]-a[0]*b[1])/d];
  },
  abs: a => Math.hypot(a[0], a[1]),
};

function polyEvalC(coeffs, s) {
  let r = [0, 0];
  for (let i = 0; i < coeffs.length; i++)
    r = C.add(C.mul(r, s), [coeffs[i], 0]);
  return r;
}

// Durand-Kerner root finder
function findRoots(coeffs) {
  let p = coeffs.slice();
  while (p.length > 1 && Math.abs(p[0]) < 1e-14) p.shift();
  const n = p.length - 1;
  if (n <= 0) return [];
  const lead = p[0];
  const monic = p.map(c => c / lead);

  if (n === 1) return [[-monic[1], 0]];
  if (n === 2) {
    const b = monic[1], c = monic[2];
    const disc = b*b - 4*c;
    if (disc >= 0) {
      const sq = Math.sqrt(disc);
      return [[(-b+sq)/2, 0], [(-b-sq)/2, 0]];
    } else {
      const sq = Math.sqrt(-disc);
      return [[-b/2, sq/2], [-b/2, -sq/2]];
    }
  }

  const roots = [];
  for (let k = 0; k < n; k++) {
    const angle = 2*Math.PI*k/n + 0.1;
    roots.push([0.4*Math.cos(angle), 0.4*Math.sin(angle)]);
  }

  for (let iter = 0; iter < 300; iter++) {
    let maxD = 0;
    for (let i = 0; i < n; i++) {
      const pVal = polyEvalC(monic, roots[i]);
      let denom = [1, 0];
      for (let j = 0; j < n; j++)
        if (i !== j) denom = C.mul(denom, C.sub(roots[i], roots[j]));
      if (C.abs(denom) < 1e-300) continue;
      const delta = C.div(pVal, denom);
      roots[i] = C.sub(roots[i], delta);
      maxD = Math.max(maxD, C.abs(delta));
    }
    if (maxD < 1e-12) break;
  }
  for (let i = 0; i < roots.length; i++) {
    if (Math.abs(roots[i][1]) < 1e-7*(1+Math.abs(roots[i][0]))) roots[i][1] = 0;
  }
  return roots;
}

function parseCoeffs(str) {
  const parts = str.trim().split(/[\s,]+/).filter(s => s.length > 0);
  const nums = parts.map(Number);
  if (nums.some(isNaN)) throw new Error('숫자가 아닌 값: ' + str);
  if (nums.length === 0) throw new Error('계수가 비었음');
  return nums;
}

// ============================================================
// 폐루프 극점 계산: D(s) + K·N(s) = 0
// ============================================================
function closedLoopPoles(num, den, K) {
  const lenD = den.length, lenN = num.length;
  const len = Math.max(lenD, lenN);
  const poly = new Array(len).fill(0);
  for (let i = 0; i < lenD; i++) poly[len-lenD+i] += den[i];
  for (let i = 0; i < lenN; i++) poly[len-lenN+i] += K * num[i];
  return findRoots(poly);
}

// 루트 로커스 전체 계산
function computeLocus(num, den, kmax) {
  const Ks = [];
  const steps = 500;
  // 로그 + 선형 혼합
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    Ks.push(kmax * t);
  }
  // 작은 K도 잘 보이게
  for (let i = 1; i <= 30; i++) Ks.unshift(kmax * i / 3000);

  const branches = [];
  let prev = null;
  for (const K of Ks) {
    let roots = closedLoopPoles(num, den, K);
    if (prev && roots.length === prev.length) {
      const matched = new Array(roots.length).fill(null);
      const used = new Array(roots.length).fill(false);
      for (let i = 0; i < prev.length; i++) {
        let bj = -1, bd = Infinity;
        for (let j = 0; j < roots.length; j++) {
          if (used[j]) continue;
          const d = (roots[j][0]-prev[i][0])**2 + (roots[j][1]-prev[i][1])**2;
          if (d < bd) { bd = d; bj = j; }
        }
        if (bj >= 0) { matched[i] = roots[bj]; used[bj] = true; }
      }
      roots = matched;
    }
    branches.push({ K, roots });
    prev = roots;
  }
  return branches;
}

// ============================================================
// Canvas
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let view = { xmin: -10, xmax: 4, ymin: -7, ymax: 7 };
let lastBranches = null;
let lastPoles = [], lastZeros = [];
let lastNum = null, lastDen = null;
let currentK = 0;
let currentRoots = [];
let dpr = 1;

function setupCanvas() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const cssW = rect.width;
  // 모바일: 정사각형에 가깝게, 데스크탑: 약간 가로형
  const isMobile = window.innerWidth < 900;
  const cssH = isMobile ? cssW * 1.0 : cssW * 0.7;
  canvas.style.height = cssH + 'px';
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function cw() { return canvas.width / dpr; }
function ch() { return canvas.height / dpr; }

function setViewFromData(poles, zeros, branches) {
  let xs = [], ys = [];
  poles.forEach(p => { xs.push(p[0]); ys.push(p[1]); });
  zeros.forEach(z => { xs.push(z[0]); ys.push(z[1]); });
  for (const b of branches) {
    for (const r of b.roots) {
      if (r && isFinite(r[0]) && isFinite(r[1]) && Math.abs(r[0]) < 1e3 && Math.abs(r[1]) < 1e3) {
        xs.push(r[0]); ys.push(r[1]);
      }
    }
  }
  if (xs.length === 0) return;
  let xmin = Math.min(...xs), xmax = Math.max(...xs);
  let ymin = Math.min(...ys), ymax = Math.max(...ys);
  const xPad = Math.max(2, (xmax - xmin) * 0.25);
  const yPad = Math.max(2, (ymax - ymin) * 0.25);
  xmin -= xPad; xmax += xPad;
  ymin -= yPad; ymax += yPad;
  const ymag = Math.max(Math.abs(ymin), Math.abs(ymax));
  view = { xmin, xmax, ymin: -ymag, ymax: ymag };
}

function x2px(x) { return (x - view.xmin) / (view.xmax - view.xmin) * cw(); }
function y2px(y) { return ch() - (y - view.ymin) / (view.ymax - view.ymin) * ch(); }

function niceStep(raw) {
  const exp = Math.floor(Math.log10(raw));
  const f = raw / Math.pow(10, exp);
  let nf;
  if (f < 1.5) nf = 1;
  else if (f < 3) nf = 2;
  else if (f < 7) nf = 5;
  else nf = 10;
  return nf * Math.pow(10, exp);
}

function drawGrid() {
  ctx.fillStyle = '#060912';
  ctx.fillRect(0, 0, cw(), ch());

  const xStep = niceStep((view.xmax-view.xmin)/8);
  const yStep = niceStep((view.ymax-view.ymin)/8);

  ctx.strokeStyle = 'rgba(125, 137, 168, 0.10)';
  ctx.lineWidth = 1;
  ctx.font = '10px monospace';
  ctx.fillStyle = 'rgba(125, 137, 168, 0.55)';

  for (let x = Math.ceil(view.xmin/xStep)*xStep; x <= view.xmax; x += xStep) {
    const px = x2px(x);
    ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, ch()); ctx.stroke();
    if (Math.abs(x) > xStep*0.01)
      ctx.fillText(x.toFixed(xStep < 1 ? 1 : 0), px+2, y2px(0)-3);
  }
  for (let y = Math.ceil(view.ymin/yStep)*yStep; y <= view.ymax; y += yStep) {
    const py = y2px(y);
    ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(cw(), py); ctx.stroke();
    if (Math.abs(y) > yStep*0.01)
      ctx.fillText(y.toFixed(yStep < 1 ? 1 : 0)+'j', x2px(0)+4, py-2);
  }

  ctx.strokeStyle = 'rgba(230, 235, 245, 0.35)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(0, y2px(0)); ctx.lineTo(cw(), y2px(0));
  ctx.moveTo(x2px(0), 0); ctx.lineTo(x2px(0), ch());
  ctx.stroke();

  ctx.fillStyle = 'rgba(230, 235, 245, 0.5)';
  ctx.font = '10px monospace';
  ctx.fillText('Re', cw()-18, y2px(0)-5);
  ctx.fillText('Im', x2px(0)+5, 12);
}

function drawPole(x, y) {
  const px = x2px(x), py = y2px(y);
  ctx.strokeStyle = '#f87171';
  ctx.lineWidth = 2.5;
  const s = 7;
  ctx.beginPath();
  ctx.moveTo(px-s, py-s); ctx.lineTo(px+s, py+s);
  ctx.moveTo(px+s, py-s); ctx.lineTo(px-s, py+s);
  ctx.stroke();
}

function drawZero(x, y) {
  const px = x2px(x), py = y2px(y);
  ctx.strokeStyle = '#60a5fa';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(px, py, 7, 0, Math.PI*2);
  ctx.stroke();
}

function drawLocus(branches) {
  if (!branches || branches.length === 0) return;
  const nRoots = branches[0].roots.length;

  ctx.strokeStyle = 'rgba(251, 191, 36, 0.4)';
  ctx.lineWidth = 1.2;
  for (let ri = 0; ri < nRoots; ri++) {
    ctx.beginPath();
    let started = false;
    for (let bi = 0; bi < branches.length; bi++) {
      const r = branches[bi].roots[ri];
      if (!r || !isFinite(r[0]) || !isFinite(r[1])) { started = false; continue; }
      const px = x2px(r[0]), py = y2px(r[1]);
      if (!started) { ctx.moveTo(px, py); started = true; }
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }

  ctx.fillStyle = '#fbbf24';
  for (const b of branches) {
    for (const r of b.roots) {
      if (!r || !isFinite(r[0]) || !isFinite(r[1])) continue;
      const px = x2px(r[0]), py = y2px(r[1]);
      if (px < -10 || px > cw()+10 || py < -10 || py > ch()+10) continue;
      ctx.beginPath();
      ctx.arc(px, py, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function drawCurrentPoles(roots) {
  if (!roots) return;
  for (const r of roots) {
    if (!r || !isFinite(r[0]) || !isFinite(r[1])) continue;
    const px = x2px(r[0]), py = y2px(r[1]);

    // 빛나는 후광 효과
    const gradient = ctx.createRadialGradient(px, py, 0, px, py, 18);
    gradient.addColorStop(0, 'rgba(239, 68, 68, 0.6)');
    gradient.addColorStop(1, 'rgba(239, 68, 68, 0)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(px, py, 18, 0, Math.PI*2);
    ctx.fill();

    // 빨간 점
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.arc(px, py, 7, 0, Math.PI*2);
    ctx.fill();

    // 흰 테두리
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function redraw() {
  drawGrid();
  if (lastBranches) drawLocus(lastBranches);
  lastZeros.forEach(z => drawZero(z[0], z[1]));
  lastPoles.forEach(p => drawPole(p[0], p[1]));
  drawCurrentPoles(currentRoots);
}

function fmtComplex(c) {
  if (!c || !isFinite(c[0]) || !isFinite(c[1])) return '—';
  const re = c[0], im = c[1];
  if (Math.abs(im) < 1e-4) return re.toFixed(3);
  return `${re.toFixed(3)}${im >= 0 ? '+' : ''}${im.toFixed(3)}j`;
}

// ============================================================
// K 변경 → 실시간 업데이트
// ============================================================
function updateK(K) {
  currentK = K;
  const kInput = document.getElementById('kdisplay');
  // 사용자가 직접 입력 중일 땐 값을 덮어쓰지 않음
  if (document.activeElement !== kInput) {
    kInput.value = K.toFixed(2);
  }
  const kmax = parseFloat(document.getElementById('kmax').value);
  const pct = Math.max(0, Math.min(1, K/kmax)) * 100;
  document.getElementById('sliderFill').style.width = pct + '%';
  document.getElementById('sliderThumb').style.left = pct + '%';

  if (lastNum && lastDen) {
    currentRoots = closedLoopPoles(lastNum, lastDen, K);
    document.getElementById('info-current').textContent =
      currentRoots.map(r => fmtComplex(r)).join(', ');
    redraw();
  }
}

// K 직접 입력 처리
const kInput = document.getElementById('kdisplay');
function applyKInput() {
  const v = parseFloat(kInput.value);
  if (!isFinite(v)) {
    kInput.value = currentK.toFixed(2);
    return;
  }
  const kmax = parseFloat(document.getElementById('kmax').value);
  // K가 kmax보다 크면 kmax 자동 확장 (편의)
  if (v > kmax) {
    document.getElementById('kmax').value = v.toFixed(2);
    document.getElementById('kmaxLabel').textContent = v.toFixed(2);
    // 궤적 재계산
    if (lastNum && lastDen) {
      lastBranches = computeLocus(lastNum, lastDen, v);
      setViewFromData(lastPoles, lastZeros, lastBranches);
    }
  }
  const clamped = Math.max(0, v);
  updateK(clamped);
  kInput.value = clamped.toFixed(2);
}
kInput.addEventListener('change', applyKInput);
kInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    kInput.blur();
  }
});
kInput.addEventListener('focus', () => kInput.select());

function stepK(delta) {
  const kmax = parseFloat(document.getElementById('kmax').value);
  let next = currentK + delta;
  next = Math.max(0, Math.min(kmax, next));
  updateK(next);
}

// ============================================================
// 슬라이더 인터랙션 (터치 + 마우스)
// ============================================================
const slider = document.getElementById('slider');
let dragging = false;

function handlePointer(e) {
  const rect = slider.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  let pct = (clientX - rect.left) / rect.width;
  pct = Math.max(0, Math.min(1, pct));
  const kmax = parseFloat(document.getElementById('kmax').value);
  updateK(pct * kmax);
}

slider.addEventListener('pointerdown', e => {
  dragging = true;
  slider.setPointerCapture(e.pointerId);
  handlePointer(e);
});
slider.addEventListener('pointermove', e => {
  if (dragging) handlePointer(e);
});
slider.addEventListener('pointerup', e => {
  dragging = false;
});
slider.addEventListener('pointercancel', () => { dragging = false; });

// ============================================================
// 메인 그리기
// ============================================================
function plot() {
  const errEl = document.getElementById('error');
  errEl.classList.remove('show');
  try {
    const num = parseCoeffs(document.getElementById('num').value);
    const den = parseCoeffs(document.getElementById('den').value);
    const kmax = parseFloat(document.getElementById('kmax').value);

    if (!isFinite(kmax) || kmax <= 0) throw new Error('K 최대값은 양수');

    const poles = findRoots(den);
    const zeros = findRoots(num);
    const branches = computeLocus(num, den, kmax);

    lastPoles = poles;
    lastZeros = zeros;
    lastBranches = branches;
    lastNum = num;
    lastDen = den;

    setupCanvas();
    setViewFromData(poles, zeros, branches);

    document.getElementById('kmaxLabel').textContent = kmax.toString();

    // 분석정보
    document.getElementById('info-poles').textContent = poles.length + ': ' +
      poles.map(p => fmtComplex(p)).join(', ');
    document.getElementById('info-zeros').textContent = zeros.length === 0 ? '0' :
      zeros.length + ': ' + zeros.map(z => fmtComplex(z)).join(', ');
    document.getElementById('info-asym').textContent = (poles.length - zeros.length).toString();
    if (poles.length > zeros.length) {
      const sumP = poles.reduce((s, p) => s + p[0], 0);
      const sumZ = zeros.reduce((s, z) => s + z[0], 0);
      document.getElementById('info-center').textContent =
        ((sumP - sumZ) / (poles.length - zeros.length)).toFixed(3);
    } else {
      document.getElementById('info-center').textContent = '—';
    }

    // K=0으로 초기화 (=개루프 극점 위치)
    updateK(0);
  } catch (e) {
    errEl.textContent = '⚠ ' + e.message;
    errEl.classList.add('show');
  }
}

function setPreset(num, den, kmax) {
  document.getElementById('num').value = num;
  document.getElementById('den').value = den;
  document.getElementById('kmax').value = kmax;
  plot();
}

function resetView() {
  if (lastBranches) {
    setupCanvas();
    setViewFromData(lastPoles, lastZeros, lastBranches);
    redraw();
  }
}

window.addEventListener('resize', () => {
  if (lastBranches) {
    setupCanvas();
    redraw();
  }
});

// 초기 실행
window.addEventListener('load', () => {
  setupCanvas();
  plot();
});
</script>
